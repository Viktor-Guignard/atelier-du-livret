<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aperçu 3D du modèle — L'Atelier du Livret</title>
  <meta name="description" content="Feuilletez ce modèle de livret de messe en 3D : rotation, zoom haute définition, double page et page à page, comme un vrai livret entre vos mains.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/livret.css">
  <link rel="stylesheet" href="css/book3d.css">
  <link rel="stylesheet" href="css/pages/modele.css">
</head>
<body>
  <main id="main">
    <section class="section" style="padding-block: var(--sp-6)">
      <div class="container-wide viewer-layout" id="viewer-layout">

        <!-- Scène 3D -->
        <div class="viewer-scene-wrap">
          <div class="viewer-scene" id="scene"></div>

          <div class="viewer-toolbar" role="toolbar" aria-label="Commandes de l'aperçu">
            <div class="viewer-toolbar-group">
              <button id="v-prev" class="btn-icon" type="button" aria-label="Page précédente" title="Page précédente">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 5l-7 7 7 7"/></svg>
              </button>
              <span id="v-indicator" class="viewer-indicator" aria-live="polite">page 1</span>
              <button id="v-next" class="btn-icon" type="button" aria-label="Page suivante" title="Page suivante">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 5l7 7-7 7"/></svg>
              </button>
            </div>

            <div class="viewer-toolbar-group viewer-modes" role="group" aria-label="Mode d'affichage">
              <button class="chip is-active" data-mode="3d" type="button" aria-pressed="true">Livre 3D</button>
              <button class="chip" data-mode="double" type="button" aria-pressed="false">Double page</button>
              <button class="chip" data-mode="simple" type="button" aria-pressed="false">Page à page</button>
            </div>

            <div class="viewer-toolbar-group" role="group" aria-label="Zoom">
              <button id="v-zoom-out" class="btn-icon" type="button" aria-label="Zoom arrière" title="Zoom arrière">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5 21 21M8 11h6"/></svg>
              </button>
              <button id="v-reset" class="btn-icon" type="button" aria-label="Réinitialiser la vue" title="Réinitialiser la vue">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7M3 4v5h5"/></svg>
              </button>
              <button id="v-zoom-in" class="btn-icon" type="button" aria-label="Zoom avant" title="Zoom avant">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5 21 21M8 11h6M11 8v6"/></svg>
              </button>
            </div>
          </div>

          <p class="viewer-hint small muted">Cliquez sur les pages pour feuilleter · glissez pour faire pivoter le livret · molette pour zoomer</p>

          <div class="viewer-thumbs" id="v-thumbs" aria-label="Aller à une page"></div>
        </div>

        <!-- Panneau modèle -->
        <aside class="viewer-panel" id="v-panel"></aside>
      </div>
    </section>
  </main>
  <script type="module" src="js/pages/modele.js"></script>
</body>
</html>
